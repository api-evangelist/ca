description: >-
  CA Technologies (originally Computer Associates) was a major enterprise
  software vendor focused on infrastructure management, DevOps, security,
  and mainframe software. It was acquired by Broadcom in November 2018 and
  its products are now part of Broadcom's Enterprise Software Division,
  including Layer 7 API Management, AppDynamics (later spun out to Cisco),
  DX Application Performance Management, Rally / Agile Central, Clarity
  PPM, BlazeMeter, AutoSys workload automation, and mainframe management
  suites. The primary developer portal is developer.broadcom.com.
